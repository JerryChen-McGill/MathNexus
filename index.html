<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MathNexus</title>
    <script>
      (function redirectGitHubPagesPath(locationObj) {
        if (locationObj.search[1] !== '/') return;
        const decoded = locationObj.search
          .slice(1)
          .split('&')
          .map((segment) => segment.replace(/~and~/g, '&'))
          .join('?');
        window.history.replaceState(null, '', locationObj.pathname.slice(0, -1) + decoded + locationObj.hash);
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
